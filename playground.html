<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>uss-xsd-engine playground</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #38bdf8;
        --border: #374151;
        --error: #f87171;
        --warning: #fbbf24;
        --ok: #34d399;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 24px;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
        align-items: center;
      }

      select,
      button {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
      }

      button {
        cursor: pointer;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      textarea,
      pre {
        width: 100%;
        min-height: 520px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #020617;
        color: var(--text);
        font-family: Consolas, Monaco, monospace;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow: auto;
      }

      .summary {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .pill {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        font-size: 13px;
      }

      .pill.ok {
        border-color: var(--ok);
      }
      .pill.error {
        border-color: var(--error);
      }
      .pill.warning {
        border-color: var(--warning);
      }

      .issues {
        margin: 0;
        padding-left: 18px;
      }

      .issues li {
        margin-bottom: 10px;
      }

      .sev-error {
        color: var(--error);
      }
      .sev-warning {
        color: var(--warning);
      }
      .sev-info {
        color: var(--accent);
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: 1fr;
        }

        textarea,
        pre {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>uss-xsd-engine playground — getSchemaDiagnostics()</h1>

      <div class="toolbar">
        <select id="testCaseSelect"></select>
        <button id="loadCaseBtn">Load test case</button>
        <button id="runDiagnosticsBtn">Run diagnostics</button>
        <button id="runTreeBtn">Run tree extraction</button>
        <button id="runSampleBtn">Generate sample XML</button>
        <button id="runValidateXmlBtn">Validate XML</button>
        <input
  id="targetPrefixInput"
  placeholder="Sample XML prefix (default tns)"
  style="padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);min-width:220px;"
/>
      </div>

      <input
        id="rootElementNameInput"
        placeholder="Optional root element name"
        style="
          padding: 10px 12px;
          border-radius: 8px;
          border: 1px solid var(--border);
          background: var(--panel-2);
          color: var(--text);
          min-width: 240px;
        "
      />

      <div class="grid">
        <div class="panel">
          <h2>XSD Input</h2>
          <textarea id="xsdInput"></textarea>
        </div>

        <div class="panel">
          <h2>XML Input</h2>
          <textarea id="xmlInput"></textarea>
        </div>

        <div class="panel">
          <h2>Diagnostics</h2>

          <div class="summary" id="summary"></div>

          <h3>Issues</h3>
          <ul class="issues" id="issues"></ul>

          <h3>Raw Result</h3>
          <pre id="rawResult"></pre>
        </div>
      </div>
    </div>
    <script src="./dist/uss-xsd-engine.standalone.js"></script>

      <xs:sequence>
        <xs:element name="to" type="xs:string"/>
        <xs:element name="from" type="xs:string"/>
      </xs:sequence>
    </xs:complexType>
  </xs:element>
</xs:schema>`
}
      ];

      const testCaseSelect = document.getElementById("testCaseSelect");
      const loadCaseBtn = document.getElementById("loadCaseBtn");
      const runDiagnosticsBtn = document.getElementById("runDiagnosticsBtn");
      const runTreeBtn = document.getElementById("runTreeBtn");
      const rootElementNameInput = document.getElementById(
        "rootElementNameInput",
      );
      const xsdInput = document.getElementById("xsdInput");
      const summaryEl = document.getElementById("summary");
      const issuesEl = document.getElementById("issues");
      const rawResultEl = document.getElementById("rawResult");
      const runSampleBtn = document.getElementById("runSampleBtn");
      const runValidateXmlBtn = document.getElementById("runValidateXmlBtn");
      const xmlInput = document.getElementById("xmlInput");

      function populateCases() {
        testCaseSelect.innerHTML = "";
        for (const testCase of TEST_CASES) {
          const option = document.createElement("option");
          option.value = testCase.id;
          option.textContent = testCase.label;
          testCaseSelect.appendChild(option);
        }
      }

      function runXmlValidation() {
        const rootElementName = rootElementNameInput.value.trim();

        const result = validateXml({
          xsdText: xsdInput.value,
          xmlText: xmlInput.value,
          options: {
            rootElementName: rootElementName || undefined,
            externalDocuments: EXTERNAL_DOCUMENTS
          },
        });

        renderSummary(result);
        renderIssues(result);
        rawResultEl.textContent = JSON.stringify(result, null, 2);
        console.log("validateXml result:", result);
      }

      function runSampleGeneration() {
        const rootElementName = rootElementNameInput.value.trim();

        const result = generateSampleXml({
          xsdText: xsdInput.value,
          options: {
            rootElementName: rootElementName || undefined,
            mode: "minimal",
            includeOptionalAttributes: true,
            externalDocuments: EXTERNAL_DOCUMENTS
          },
        });

        renderSummary(result);
        renderIssues(result);
        rawResultEl.textContent = JSON.stringify(result, null, 2);
        console.log("generateSampleXml result:", result);
      }

      function runTreeExtraction() {
        const rootElementName = rootElementNameInput.value.trim();

        const result = extractSchemaTree({
          xsdText: xsdInput.value,
          options: {
            rootElementName: rootElementName || undefined,
            expandRefs: true,
            externalDocuments: EXTERNAL_DOCUMENTS
          },
        });

        renderSummary(result);
        renderIssues(result);
        rawResultEl.textContent = JSON.stringify(result, null, 2);
        console.log("extractSchemaTree result:", result);
      }

      function getSelectedCase() {
        return (
          TEST_CASES.find((item) => item.id === testCaseSelect.value) ||
          TEST_CASES[0]
        );
      }

      function loadSelectedCase() {
        const testCase = getSelectedCase();
        xsdInput.value = testCase.xsd;
        xmlInput.value = testCase.xml || "";
      }

      function renderSummary(result) {
        summaryEl.innerHTML = "";

        const pills = [
          { text: `ok: ${result.ok}`, cls: result.ok ? "ok" : "error" },
          {
            text: `errors: ${result.summary.errorCount}`,
            cls: result.summary.errorCount ? "error" : "",
          },
          {
            text: `warnings: ${result.summary.warningCount}`,
            cls: result.summary.warningCount ? "warning" : "",
          },
          { text: `infos: ${result.summary.infoCount}`, cls: "" },
        ];

        if (result.data?.schemaStats) {
          pills.push({
            text: `roots: ${result.data.roots?.length || 0}`,
            cls: "",
          });
          pills.push({
            text: `global elements: ${result.data.schemaStats.globalElementCount}`,
            cls: "",
          });
          pills.push({
            text: `complex types: ${result.data.schemaStats.globalComplexTypeCount}`,
            cls: "",
          });
          pills.push({
            text: `simple types: ${result.data.schemaStats.globalSimpleTypeCount}`,
            cls: "",
          });
        }

        for (const pill of pills) {
          const div = document.createElement("div");
          div.className = `pill ${pill.cls}`.trim();
          div.textContent = pill.text;
          summaryEl.appendChild(div);
        }
      }

      function renderIssues(result) {
        issuesEl.innerHTML = "";

        if (!result.issues.length) {
          const li = document.createElement("li");
          li.textContent = "No issues.";
          issuesEl.appendChild(li);
          return;
        }

        for (const issue of result.issues) {
          const li = document.createElement("li");

          const head = document.createElement("div");
          head.className = `sev-${issue.severity}`;
          head.textContent = `[${issue.severity.toUpperCase()}] ${issue.code}: ${issue.message}`;
          li.appendChild(head);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = [
            issue.line != null ? `line ${issue.line}` : null,
            issue.column != null ? `column ${issue.column}` : null,
            issue.nodeKind ? `node ${issue.nodeKind}` : null,
            issue.name ? `name ${issue.name}` : null,
            issue.path ? `path ${issue.path}` : null,
          ]
            .filter(Boolean)
            .join(" | ");
          li.appendChild(meta);

          issuesEl.appendChild(li);
        }
      }

      function runDiagnostics() {
        const result = getSchemaDiagnostics({
          xsdText: xsdInput.value,
          options: {
            includeWarnings: true,
            includeFeatureSummary: true,
            includeRoots: true,
            externalDocuments: EXTERNAL_DOCUMENTS
          },
        });

        renderSummary(result);
        renderIssues(result);
        rawResultEl.textContent = JSON.stringify(result, null, 2);
        console.log("getSchemaDiagnostics result:", result);
      }

      populateCases();
      loadSelectedCase();
      runDiagnostics();

      loadCaseBtn.addEventListener("click", loadSelectedCase);
      runDiagnosticsBtn.addEventListener("click", runDiagnostics);
      runTreeBtn.addEventListener("click", runTreeExtraction);
      runSampleBtn.addEventListener("click", runSampleGeneration);
      runValidateXmlBtn.addEventListener("click", runXmlValidation);
    </script>
  </body>
</html>
